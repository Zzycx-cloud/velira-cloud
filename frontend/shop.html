<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahsulotlar — Velira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
  .shop-grid{max-width:1280px; margin:0 auto; padding:70px 6vw 120px; display:grid; grid-template-columns:1fr 1fr; gap:28px;}
  .pcard{border:1px solid rgba(11,37,69,0.08); border-radius:24px; overflow:hidden; display:flex; flex-direction:column; transition:box-shadow .5s ease, transform .5s cubic-bezier(.22,1,.36,1);}
  .pcard:hover{box-shadow:0 30px 60px -20px rgba(11,37,69,0.18); transform:translateY(-3px);}
  .pcard .pimg{background:var(--sky); display:flex; align-items:center; justify-content:center; padding:36px;}
  .pcard img{max-width:280px; width:100%; border-radius:10px;}
  .pcard-body{padding:28px 30px 30px;}
  .tag-row{display:flex; gap:8px; margin-bottom:14px;}
  .tag{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; padding:5px 10px; border-radius:20px; background:var(--sky); color:var(--azure-deep);}
  .pcard-body h3{font-size:24px; margin-bottom:8px;}
  .pcard-body p{font-size:14px; color:var(--grey); line-height:1.6; margin-bottom:20px;}
  .price-row{display:flex; align-items:center; justify-content:space-between;}
  .price{font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600;}
  .buy-btn{background:var(--navy); color:var(--white); padding:12px 22px; border-radius:30px; font-size:13px; font-weight:600; border:none; transition:background .35s ease;}
  .buy-btn:hover{background:var(--azure);}
  .buy-btn.added{background:#1B8A5A;}
  @media(max-width:900px){ .shop-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="loader-ring"></div></div>
<script>
  (function(){
    var hidden = false;
    function hideLoader(){
      if(hidden) return;
      hidden = true;
      var l = document.getElementById('pageLoader');
      if(l) l.classList.add('hide');
    }
    window.addEventListener('load', function(){ setTimeout(hideLoader, 280); });
    setTimeout(hideLoader, 1800); // safety fallback
  })();
</script>

<div id="site-header"></div>

<section class="page-hero">
  <span class="eyebrow" data-i="shopEyebrow">Katalog</span>
  <h1 data-i="shopTitle">Barcha mahsulotlar</h1>
  <p data-i="shopSub">Ikkala hidimiz ham bir xil kuchli formulaga ega — sizga yoqqanini tanlang.</p>
</section>

<div class="shop-grid" id="shopGrid">
  <!-- product cards injected by JS -->
</div>

<div id="site-footer"></div>

<!-- Cart drawer -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-head">
    <h3 data-i="cartTitle">Sizning savatingiz</h3>
    <button class="close-btn" id="closeCartBtn">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-drawer-foot" id="cartFoot" style="display:none;">
    <div class="cart-total-row"><span data-i="cartTotal">Jami</span><span id="cartTotalValue">0 UZS</span></div>
    <button class="checkout-btn" id="checkoutBtn" data-i="checkoutBtn">Buyurtma berish</button>
  </div>
</div>

<!-- Checkout modal -->
<div class="modal-overlay" id="checkoutModal">
  <div class="modal">
    <h3 data-i="checkoutTitle">Buyurtmani rasmiylashtirish</h3>
    <p class="modal-sub" data-i="checkoutSub">Ma'lumotlaringizni qoldiring — administrator siz bilan bog'lanadi.</p>
    <form id="checkoutForm">
      <div class="field"><label data-i="labelName">Ismingiz</label><input name="name" required data-i-placeholder="placeholderName" placeholder="Ism Familiya"></div>
      <div class="field"><label data-i="labelPhone">Telefon raqam</label><input name="phone" required data-i-placeholder="placeholderPhone" placeholder="+998 90 000 00 00"></div>
      <div class="field"><label data-i="labelAddress">Manzil (ixtiyoriy)</label><input name="address" data-i-placeholder="placeholderAddress" placeholder="Shahar, ko'cha, uy"></div>
      <div class="field"><label data-i="labelComment">Izoh (ixtiyoriy)</label><textarea name="comment" data-i-placeholder="placeholderComment" placeholder="Qo'shimcha izoh..."></textarea></div>
      <button type="submit" class="modal-submit" data-i="submitOrder">Buyurtmani tasdiqlash</button>
      <div class="form-status" id="orderStatus"></div>
    </form>
    <button class="close-btn" id="closeCheckoutBtn" style="position:absolute; top:24px; right:24px;">✕</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init({ publicKey: "0HBwuawTW_FpYC_cB" });</script>
<script src="js/components.js"></script>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script>
  renderHeader('shop');
  renderFooter();

  async function renderShopGrid(){
    const grid = document.getElementById('shopGrid');
    const lang = localStorage.getItem('velira_lang') || 'ru';
    try{
      const products = await ensureProducts();
      grid.innerHTML = products.map(p => `
        <div class="pcard">
          <div class="pimg"><img src="${p.image}" alt="${p.name[lang]}"></div>
          <div class="pcard-body">
            <div class="tag-row">
              <span class="tag">${p.scent}</span>
              <span class="tag">${p.loads} ${lang === 'ru' ? 'стирок' : 'stirka'}</span>
            </div>
            <h3>${p.name[lang]}</h3>
            <p>${p.description[lang]}</p>
            <div class="price-row">
              <span class="price">${p.price.toLocaleString('uz-UZ')} ${p.currency}</span>
              <button class="buy-btn" data-i="addToCart" onclick="quickAdd('${p.id}', this)">Savatga qo'shish</button>
            </div>
          </div>
        </div>
      `).join('');
    }catch(err){
      grid.innerHTML = `<p style="color:var(--grey)">Mahsulotlarni yuklab bo'lmadi. Backend ishga tushirilganini tekshiring.</p>`;
    }
  }

  function quickAdd(id, btn){
    addToCart(id);
    const original = btn.textContent;
    btn.textContent = currentLangText('inCart') || 'Qo\'shildi';
    btn.classList.add('added');
    setTimeout(()=>{ btn.textContent = original; btn.classList.remove('added'); }, 1400);
  }

  document.addEventListener('langchange', renderShopGrid);
  renderShopGrid();
</script>
</body>
</html>
